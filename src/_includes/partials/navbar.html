<div class="{{'lg:fixed' if path == 'home' }} w-full">
    <nav class="container flex flex-wrap items-center justify-center p-6 mx-auto px-0 lg:justify-between" x-data="{ isOpen: false }" @keydown.escape="isOpen = false"  @click.away="isOpen = false">
        <!--Logo etc-->
        <div class="flex items-center">
            <a href="https://imssb-bc.netlify.app/solicitudes" 
                    class="text-indigo-500 font-bold text-lg">
                <img src="../../static/img/imssb-logo.svg" alt="Logo" class="mr-auto h-10 md:h-12">
            </a>
        </div>

        <!--Toggle button (hidden on large screens)-->
        <button @click="isOpen = !isOpen" type="button" class="block ml-auto px-2 text-primary-500 hover:text-primary-500 focus:outline-none focus:text-primary-500 lg:hidden" :class="{'transition transform-180': isOpen }" aria-label="Menu">
            <svg class="h-6 w-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewbox="0 0 24 24">
                <path x-show="isOpen" fill-rule="evenodd" clip-rule="evenodd" d="M18.278 16.864a1 1 0 0 1-1.414 1.414l-4.829-4.828-4.828 4.828a1 1 0 0 1-1.414-1.414l4.828-4.829-4.828-4.828a1 1 0 0 1 1.414-1.414l4.829 4.828 4.828-4.828a1 1 0 1 1 1.414 1.414l-4.828 4.829 4.828 4.828z"/>
                <path x-show="!isOpen" fill-rule="evenodd" d="M4 5h16a1 1 0 0 1 0 2H4a1 1 0 1 1 0-2zm0 6h16a1 1 0 0 1 0 2H4a1 1 0 0 1 0-2zm0 6h16a1 1 0 0 1 0 2H4a1 1 0 0 1 0-2z"/>
            </svg>
        </button>

        <!--Menu-->
        <div class="flex-grow items-center w-full w-auto text-center lg:flex" :class="{'block shadow-3xl': isOpen, 'hidden': !isOpen }" x-show.transition="true">

            {% if navigation.items %}

                <ul class="flex-1 justify-end items-center pt-6 pt-0 list-reset lg:flex">
                    {% for item in navigation.items %}
                        <li class="mr-3 nav__item">
                            <a @click="isOpen = false" class="inline-block py-2 px-4 text-ml text-gray-500 no-underline hover:text-indigo-500" href="{{ item.url }}">{{ item.text }}</a>
                        </li>
                    {% endfor %}
                </ul>

            {% endif %}
        </div>
    </nav>
</div>
